<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Your Mehtaji</title>
<style>
  :root { color-scheme: light; }
  html, body { margin:0; height:100%; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(1200px 600px at 20% 0%, rgba(99,102,241,.18), transparent 60%),
      radial-gradient(900px 500px at 100% 100%, rgba(244,114,182,.18), transparent 60%),
      linear-gradient(160deg,#0b1020 0%,#111634 50%,#1b1336 100%);
    color: #f8fafc;
    overflow: hidden;
  }
  .wrap { text-align:center; transform: translateY(-4%); }
  .mark {
    width: 96px; height: 96px; margin: 0 auto 22px; border-radius: 24px;
    display:flex; align-items:center; justify-content:center;
    font-size: 52px; font-weight: 700;
    background: linear-gradient(135deg,#6366f1,#ec4899);
    box-shadow: 0 20px 60px -10px rgba(99,102,241,.6), inset 0 1px 0 rgba(255,255,255,.25);
    animation: pop .9s cubic-bezier(.2,.9,.2,1.2) both;
  }
  h1 { margin:0; font-size: 28px; letter-spacing:-.01em; font-weight: 600; }
  p  { margin: 6px 0 28px; opacity:.7; font-size: 13px; letter-spacing:.18em; text-transform: uppercase; }
  .bar { width: 220px; height: 3px; margin: 0 auto; border-radius: 99px;
    background: rgba(255,255,255,.08); overflow:hidden; position: relative; }
  .bar::after { content:""; position:absolute; inset:0; width:40%;
    background: linear-gradient(90deg, transparent, #a5b4fc, transparent);
    animation: slide 1.1s infinite ease-in-out;
  }
  @keyframes pop { from { transform: scale(.6); opacity:0 } to { transform: scale(1); opacity:1 } }
  @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
  .ver { position: fixed; bottom: 14px; left: 0; right: 0; text-align:center; font-size:11px; opacity:.45; letter-spacing:.1em }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">म</div>
    <h1>Your Mehtaji</h1>
    <p>Opening your books</p>
    <div class="bar"></div>
  </div>
  <div class="ver">© Your Mehtaji</div>
</body>
</html>
